services:
  - type: web
    name: backend-magzine
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://www.realitylifemagazine.com,https://reallife-magzine-y3mq.vercel.app,http://localhost:5173
